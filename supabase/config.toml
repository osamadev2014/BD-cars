# =============================================
# Ryon - Supabase Local Development Configuration
# =============================================
# Compatible with Supabase CLI 2.109.1
# Run: supabase start

project_id = "ryon-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.vehicles]
file_size_limit = "50MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "image/avif"]
public = true

[storage.buckets.avatars]
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]
public = true

[storage.buckets.inspection-media]
file_size_limit = "50MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "video/mp4"]
public = false

[storage.buckets.documents]
file_size_limit = "20MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png"]
public = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.sms.twilio]
enabled = false

[auth.sms.test_otp]
"0555000001" = "1234"
"0555000002" = "1234"
"0555000003" = "1234"
"0555000004" = "1234"
"0555000005" = "1234"

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2

[analytics]
enabled = false
